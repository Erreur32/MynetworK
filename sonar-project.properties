sonar.projectKey=Erreur32_MynetworK
sonar.organization=erreur32

sonar.projectName=MynetworK
sonar.projectVersion=0.7.96

# Sources
sonar.sources=src,server
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.*,**/*.spec.*,**/coverage/**,src/constants/version.ts,src/main.tsx

# Exclude version-managed files from duplication detection (updated by update-version.sh, not real duplication)
sonar.cpd.exclusions=**/constants/version.ts,**/main.tsx,**/FreeboxPlugin.ts,**/UniFiPlugin.ts,**/ScanReseauPlugin.ts

# Exclude all sources from coverage (no test suite in this project)
sonar.coverage.exclusions=**/*

# TypeScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Security hotspot exclusions for false positives
# S2245: Math.random() used for visual animations (not security), safe
# S1313: Hardcoded IPs expected in a network monitoring tool (private ranges, DNS defaults)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8

# S2245 (Math.random) - frontend animation/visual code only
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e1.resourceKey=src/components/AnimatedBackground.tsx

# S2245 (Math.random) - frontend visual hooks
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e2.resourceKey=src/hooks/useBackgroundAnimation.ts

# S1313 (Hardcoded IPs) - expected in network monitoring tool (private ranges, Freebox defaults)
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*

# S2245 (Math.random) - frontend visual widgets (signal bars, charts)
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e4.resourceKey=src/components/widgets/**

# S2245 (Math.random) - frontend mock data in modals
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e5.resourceKey=src/components/modals/**

# S2245 (Math.random) - frontend store ID generation (non-security)
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e6.resourceKey=src/stores/**

# S5332 (HTTP protocol) - ip-api.com free tier has no HTTPS option
sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.e7.resourceKey=server/routes/plugins.ts

# S4721 (Command injection) - validated by strict regex allowlist before exec
sonar.issue.ignore.multicriteria.e8.ruleKey=typescript:S4721
sonar.issue.ignore.multicriteria.e8.resourceKey=server/**
